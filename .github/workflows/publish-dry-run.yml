name: Publish (dry run)

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  publish-dry-run:
    name: Publish (dry run)
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    uses: ./.github/workflows/release.yml
    with:
      dry_run: true
