name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: synodic-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: synodic-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: synodic-darwin-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: synodic-darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo 'CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc' >> "$GITHUB_ENV"

      - name: Build release binaries
        run: |
          cd rust
          cargo build --release --target ${{ matrix.target }}

      - name: Package binaries
        run: |
          mkdir -p dist
          cp rust/target/${{ matrix.target }}/release/synodic dist/ 2>/dev/null || true
          cp rust/target/${{ matrix.target }}/release/synodic-http dist/ 2>/dev/null || true
          tar czf ${{ matrix.artifact }}.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  npm-publish:
    name: Publish npm packages
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Set versions across all packages
        run: bash scripts/set-npm-version.sh ${{ steps.version.outputs.version }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare platform packages
        run: |
          # Map artifact names to npm package directories
          declare -A ARTIFACT_MAP=(
            ["synodic-darwin-arm64"]="npm/cli-darwin-arm64"
            ["synodic-darwin-x64"]="npm/cli-darwin-x64"
            ["synodic-linux-x64"]="npm/cli-linux-x64"
            ["synodic-linux-arm64"]="npm/cli-linux-arm64"
          )

          for artifact in "${!ARTIFACT_MAP[@]}"; do
            pkg_dir="${ARTIFACT_MAP[$artifact]}"
            echo "Extracting $artifact -> $pkg_dir"
            tar xzf "artifacts/$artifact/$artifact.tar.gz" -C "$pkg_dir"
            chmod +x "$pkg_dir/synodic"
            ls -la "$pkg_dir/"
          done

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in npm/cli-darwin-arm64 npm/cli-darwin-x64 npm/cli-linux-x64 npm/cli-linux-arm64; do
            pkg_name=$(node -p "require('./$dir/package.json').name")
            pkg_version=$(node -p "require('./$dir/package.json').version")
            if npm view "$pkg_name@$pkg_version" >/dev/null 2>&1; then
              echo "Skipping $pkg_name@$pkg_version (already exists)"
              continue
            fi
            echo "Publishing $pkg_name@$pkg_version..."
            npm publish "$dir" --access public
          done

      - name: Publish wrapper package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pkg_name=$(node -p "require('./packages/cli/package.json').name")
          pkg_version=$(node -p "require('./packages/cli/package.json').version")
          if npm view "$pkg_name@$pkg_version" >/dev/null 2>&1; then
            echo "Skipping $pkg_name@$pkg_version (already exists)"
          else
            echo "Publishing $pkg_name@$pkg_version..."
            npm publish packages/cli --access public
          fi

  release:
    name: Create GitHub Release
    needs: [build, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*.tar.gz
