# CI Auto-Fix Feedback Loop
#
# When CI fails on an agent-created PR, this workflow:
# 1. Extracts actionable error from CI logs
# 2. Spawns Claude Code to fix the issue
# 3. Pushes the fix to the same branch
# 4. CI re-triggers automatically
#
# Iteration is capped at 3 attempts per PR (tracked via labels).
# Portable: any repo can adopt this workflow by copying it and setting variables.
#
# Required secrets:
#   ANTHROPIC_API_KEY â€” for Claude Code
#
# Optional repo variables:
#   CI_FIX_MAX_ATTEMPTS â€” max fix attempts (default: 3)
#   CI_FIX_BRANCH_PATTERN â€” regex for branches to monitor (default: factory/.*|claude/.*)
#   CI_FIX_MODEL â€” Claude model to use (default: claude-sonnet-4-6)

name: CI Auto-Fix

on:
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  checks: read
  actions: read

concurrency:
  group: ci-fix-${{ github.event.check_suite.head_branch }}
  cancel-in-progress: true

jobs:
  ci-fix:
    name: Auto-fix CI failure
    runs-on: ubuntu-latest
    if: >-
      github.event.check_suite.conclusion == 'failure' &&
      github.event.check_suite.pull_requests[0] != null

    steps:
      - name: Check branch pattern
        id: check-branch
        env:
          BRANCH: ${{ github.event.check_suite.head_branch }}
          PATTERN: ${{ vars.CI_FIX_BRANCH_PATTERN || 'factory/.*|claude/.*' }}
        run: |
          if echo "$BRANCH" | grep -qE "^($PATTERN)$"; then
            echo "match=true" >> "$GITHUB_OUTPUT"
          else
            echo "match=false" >> "$GITHUB_OUTPUT"
            echo "Branch '$BRANCH' does not match pattern '$PATTERN' â€” skipping"
          fi

      - name: Get PR details
        if: steps.check-branch.outputs.match == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.check_suite.pull_requests[0].number }}
        run: |
          # Get current fix attempt count from labels
          LABELS=$(gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/labels --jq '.[].name')
          ATTEMPT=0
          for i in 1 2 3; do
            if echo "$LABELS" | grep -q "ci-fix-attempt-${i}"; then
              ATTEMPT=$i
            fi
          done
          NEXT_ATTEMPT=$((ATTEMPT + 1))
          MAX_ATTEMPTS=${{ vars.CI_FIX_MAX_ATTEMPTS || 3 }}

          echo "current_attempt=${ATTEMPT}" >> "$GITHUB_OUTPUT"
          echo "next_attempt=${NEXT_ATTEMPT}" >> "$GITHUB_OUTPUT"
          echo "max_attempts=${MAX_ATTEMPTS}" >> "$GITHUB_OUTPUT"
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

          if [ "$NEXT_ATTEMPT" -gt "$MAX_ATTEMPTS" ]; then
            echo "exhausted=true" >> "$GITHUB_OUTPUT"
          else
            echo "exhausted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Handle exhaustion
        if: >-
          steps.check-branch.outputs.match == 'true' &&
          steps.pr.outputs.exhausted == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          # Add exhaustion label
          gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/labels \
            --method POST --input - <<< '{"labels":["ci-fix-exhausted"]}'

          # Comment on PR
          gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/comments \
            --method POST --input - <<EOF
          {
            "body": "## CI Auto-Fix Exhausted\n\nReached maximum of ${{ steps.pr.outputs.max_attempts }} fix attempts. The CI failure requires manual investigation.\n\n**Fix attempts made:** ${{ steps.pr.outputs.current_attempt }}\n\nPlease review the CI logs and fix manually."
          }
          EOF
          echo "::notice::CI fix attempts exhausted for PR #${PR_NUMBER}"

      - name: Checkout
        if: >-
          steps.check-branch.outputs.match == 'true' &&
          steps.pr.outputs.exhausted == 'false'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.check_suite.head_branch }}
          fetch-depth: 0

      - name: Extract CI failure logs
        if: >-
          steps.check-branch.outputs.match == 'true' &&
          steps.pr.outputs.exhausted == 'false'
        id: extract
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHECK_SUITE_ID: ${{ github.event.check_suite.id }}
        run: |
          # Get failed check runs from this suite
          FAILED_RUNS=$(gh api repos/${{ github.repository }}/check-suites/${CHECK_SUITE_ID}/check-runs \
            --jq '.check_runs[] | select(.conclusion == "failure") | {id: .id, name: .name}')

          ERROR_LOG=""
          while IFS= read -r run; do
            RUN_ID=$(echo "$run" | jq -r '.id')
            RUN_NAME=$(echo "$run" | jq -r '.name')

            if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
              continue
            fi

            # Fetch log for this check run (annotations first, then full log)
            ANNOTATIONS=$(gh api repos/${{ github.repository }}/check-runs/${RUN_ID}/annotations \
              --jq '.[] | "  \(.annotation_level): \(.path):\(.start_line) â€” \(.message)"' 2>/dev/null || true)

            # Get the workflow run logs if available
            LOG_EXCERPT=""
            # Try to get job logs from the workflow run
            WORKFLOW_JOBS=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.event.check_suite.id }}/jobs \
              --jq '.jobs[] | select(.conclusion == "failure") | .id' 2>/dev/null || true)

            for JOB_ID in $WORKFLOW_JOBS; do
              JOB_LOG=$(gh api repos/${{ github.repository }}/actions/jobs/${JOB_ID}/logs 2>/dev/null | tail -200 || true)
              if [ -n "$JOB_LOG" ]; then
                LOG_EXCERPT="${LOG_EXCERPT}${JOB_LOG}\n"
              fi
            done

            ERROR_LOG="${ERROR_LOG}### Failed: ${RUN_NAME}\n"
            if [ -n "$ANNOTATIONS" ]; then
              ERROR_LOG="${ERROR_LOG}**Annotations:**\n${ANNOTATIONS}\n"
            fi
            if [ -n "$LOG_EXCERPT" ]; then
              ERROR_LOG="${ERROR_LOG}**Log (last 200 lines):**\n${LOG_EXCERPT}\n"
            fi
            ERROR_LOG="${ERROR_LOG}\n"
          done <<< "$FAILED_RUNS"

          # Also try the simpler approach: get the workflow run directly
          if [ -z "$ERROR_LOG" ]; then
            # Fallback: list recent failed runs on this branch
            BRANCH="${{ github.event.check_suite.head_branch }}"
            FAILED_WORKFLOW=$(gh run list --branch "$BRANCH" --status failure --limit 1 --json databaseId --jq '.[0].databaseId' 2>/dev/null || true)
            if [ -n "$FAILED_WORKFLOW" ] && [ "$FAILED_WORKFLOW" != "null" ]; then
              ERROR_LOG=$(gh run view "$FAILED_WORKFLOW" --log-failed 2>/dev/null | tail -200 || echo "Could not fetch logs")
            fi
          fi

          if [ -z "$ERROR_LOG" ]; then
            ERROR_LOG="Could not extract specific failure logs. Check the Actions tab manually."
          fi

          # Write to file to avoid shell escaping issues
          echo -e "$ERROR_LOG" > /tmp/ci-error.log

          # Truncate if too long (keep last 300 lines)
          tail -300 /tmp/ci-error.log > /tmp/ci-error-truncated.log
          mv /tmp/ci-error-truncated.log /tmp/ci-error.log

          echo "Extracted CI error log ($(wc -l < /tmp/ci-error.log) lines)"

      - name: Get PR context
        if: >-
          steps.check-branch.outputs.match == 'true' &&
          steps.pr.outputs.exhausted == 'false'
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          # Get PR body (contains spec reference from factory)
          gh api repos/${{ github.repository }}/pulls/${PR_NUMBER} \
            --jq '.body' > /tmp/pr-body.txt

          # Get list of files changed in the PR
          gh api repos/${{ github.repository }}/pulls/${PR_NUMBER}/files \
            --jq '.[].filename' > /tmp/pr-files.txt

          echo "PR has $(wc -l < /tmp/pr-files.txt) changed files"

      - name: Run Claude Code fix
        if: >-
          steps.check-branch.outputs.match == 'true' &&
          steps.pr.outputs.exhausted == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          CI_ERROR=$(cat /tmp/ci-error.log)
          PR_BODY=$(cat /tmp/pr-body.txt)
          PR_FILES=$(cat /tmp/pr-files.txt)
          ATTEMPT=${{ steps.pr.outputs.next_attempt }}

          # Build the fix prompt
          cat > /tmp/fix-prompt.md << 'PROMPT_EOF'
          You are a CI fix agent. A PR was created by an automated factory process,
          but GitHub CI has failed. Your job is to fix the CI failure.

          ## Constraints

          1. ONLY modify files that are already part of this PR's diff. Do not expand scope.
          2. ONLY fix the specific CI failure. Do not make general improvements.
          3. If the fix requires changes outside the PR's scope, explain why in a comment and stop.
          4. Make the minimal change needed to pass CI.
          5. Commit with message prefix "ci-fix:" describing what you fixed.

          ## PR Description
          PROMPT_EOF

          echo "$PR_BODY" >> /tmp/fix-prompt.md

          cat >> /tmp/fix-prompt.md << 'PROMPT_EOF'

          ## Files in this PR
          PROMPT_EOF

          echo "$PR_FILES" >> /tmp/fix-prompt.md

          cat >> /tmp/fix-prompt.md << 'PROMPT_EOF'

          ## CI Failure Log
          PROMPT_EOF

          echo "$CI_ERROR" >> /tmp/fix-prompt.md

          cat >> /tmp/fix-prompt.md << PROMPT_EOF

          ## Instructions

          1. Read the CI failure log carefully. Identify the root cause.
          2. Read the relevant source files to understand context.
          3. Make the minimal fix to resolve the CI failure.
          4. Run the failing command locally to verify your fix works.
          5. Commit with: git commit -m "ci-fix: <description of what you fixed>"
          6. This is fix attempt ${ATTEMPT} of ${{ steps.pr.outputs.max_attempts }}.
          PROMPT_EOF

          # Run Claude Code
          # Uses claude-code CLI if available, otherwise falls back to API
          if command -v claude &> /dev/null; then
            claude --print -p "$(cat /tmp/fix-prompt.md)" --allowedTools "Bash,Read,Edit,Write,Glob,Grep"
          else
            echo "::error::Claude Code CLI not available. Install it or use anthropics/claude-code-action."
            exit 1
          fi

      - name: Push fix and label
        if: >-
          steps.check-branch.outputs.match == 'true' &&
          steps.pr.outputs.exhausted == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          ATTEMPT: ${{ steps.pr.outputs.next_attempt }}
        run: |
          BRANCH="${{ github.event.check_suite.head_branch }}"

          # Check if Claude made any changes
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes made by fix agent"
            gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/comments \
              --method POST --input - <<EOF
          {
            "body": "## CI Auto-Fix Attempt ${ATTEMPT}\n\nThe fix agent could not determine a fix for this CI failure. Manual investigation needed.\n\nSee the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          }
          EOF
            exit 0
          fi

          # Push the fix
          git push origin HEAD:"${BRANCH}"

          # Add attempt label
          gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/labels \
            --method POST --input - <<< "{\"labels\":[\"ci-fix-attempt-${ATTEMPT}\"]}"

          # Comment on PR
          COMMIT_MSG=$(git log -1 --pretty=%s)
          gh api repos/${{ github.repository }}/issues/${PR_NUMBER}/comments \
            --method POST --input - <<EOF
          {
            "body": "## CI Auto-Fix Attempt ${ATTEMPT}\n\n**Fix:** ${COMMIT_MSG}\n\nCI will re-run automatically. See the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          }
          EOF

          echo "::notice::Pushed CI fix attempt ${ATTEMPT} for PR #${PR_NUMBER}"
