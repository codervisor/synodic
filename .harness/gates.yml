## Standard lint/test checks (cargo fmt, clippy, cargo test) are handled by:
##   - Git hooks (.githooks/pre-commit, pre-push)
##   - CI (.github/workflows/ci.yml)
##
## Harness gates are reserved for governance-specific checks that go
## beyond what standard tooling provides.

gates:
  preflight:
    - name: governance-rules
      match: "*"
      command: .harness/scripts/static_gate.sh 2>&1
